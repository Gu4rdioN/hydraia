<!DOCTYPE html>
<html lang="pt-br" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydralynx AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>

        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }
        
        #spectrum-canvas {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            filter: blur(12px); opacity: 0.9;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .message-bubble {
            padding: 12px 18px; border-radius: 15px; margin-bottom: 10px;
            max-width: 85%; font-size: 14px; line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
            word-wrap: break-word;
        }

        .ai-msg h2, .ai-msg h3 { font-size: 1.1rem; font-weight: bold; color: #3b82f6; margin: 10px 0 5px 0; font-family: 'Orbitron'; }
        .ai-msg p { margin-bottom: 8px; }
        .ai-msg ul { list-style-type: disc; padding-left: 20px; margin-bottom: 10px; }
        .ai-msg strong { color: #fff; font-weight: 700; }
        .ai-msg code { background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; color: #f87171; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { background: rgba(255, 255, 255, 0.1); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { border: 1px solid rgba(59, 130, 246, 0.3); align-self: flex-start; border-bottom-left-radius: 2px; color: #e2e8f0; }

        .typing-dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }


        #chat-scroll {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #chat-scroll::-webkit-scrollbar { width: 4px; }
        #chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .reveal-text { opacity: 0; transform: translateY(40px); filter: blur(12px); transition: all 1.4s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal-text.active { opacity: 1; transform: translateY(0); filter: blur(0); }
        .blink-under { animation: blink-cursor 1s infinite; }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #moving-logo { position: fixed; z-index: 110; font-family: 'Orbitron'; font-weight: 900; pointer-events: none; text-transform: uppercase; }
        #main-content { opacity: 0; transition: opacity 1.5s ease; height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <canvas id="spectrum-canvas"></canvas>
    <div id="moving-logo"><span id="type-target"></span><span class="blink-under">|</span></div>
    <div id="loader"></div>

    <div id="main-content">
        <nav class="fixed top-0 left-0 w-full z-50 flex justify-end p-6 md:p-8 pointer-events-none">
            <a href="#" class="text-[10px] font-bold tracking-[0.3em] uppercase text-gray-400 pointer-events-auto hover:text-white transition-colors">API_STATUS: ONLINE</a>
        </nav>

        <section class="flex-1 flex flex-col items-center justify-center p-4 overflow-hidden">
            <div class="reveal-text text-center mb-6 mt-12 md:mt-0">
                <p class="font-orbitron text-blue-400 tracking-[0.5em] text-[10px] mb-2 uppercase">Interface Neural</p>
                <h2 class="text-3xl font-bold font-orbitron tracking-tighter">HYDRALYNX <span class="text-gray-600">AI</span></h2>
            </div>

            <div class="reveal-text chat-container w-full max-w-3xl h-[70vh] md:h-[65vh] relative">
                <div class="w-full px-6 py-3 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <div class="flex items-center">
                        <span class="text-[9px] font-orbitron tracking-[0.3em] text-blue-400 animate-pulse">● SYSTEM_ACTIVE</span>
                    </div>
                    <span class="text-[9px] font-orbitron tracking-[0.3em] text-gray-500 hidden sm:block">ENCRYPTED_CONNECTION</span>
                </div>

                <div id="chat-scroll" class="flex-1 p-6 flex flex-col gap-4">
                    <div class="ai-msg message-bubble">
                        Sistemas inicializados. Sou a inteligência da Hydralynx. Como posso atuar no seu projeto hoje?
                    </div>
                </div>
                
                <div class="p-4 bg-black/40 border-t border-white/5">
                    <div class="relative flex items-center">
                        <input type="text" id="user-input" 
                            class="w-full bg-white/5 border border-white/10 rounded-full py-4 px-6 pr-16 focus:outline-none focus:border-blue-500/50 transition-all font-light text-sm text-white"
                            placeholder="Envie um comando ou mensagem...">
                        <button onclick="enviarMensagem()" class="absolute right-2 p-3 bg-white text-black rounded-full hover:scale-105 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const chatScroll = document.getElementById('chat-scroll');
            const texto = input.value.trim();

            if (!texto) return;

            const userDiv = document.createElement('div');
            userDiv.className = "user-msg message-bubble";
            userDiv.innerText = texto;
            chatScroll.appendChild(userDiv);
            input.value = '';
            chatScroll.scrollTop = chatScroll.scrollHeight;

            const typingId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = "ai-msg message-bubble flex items-center gap-1";
            typingDiv.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            chatScroll.appendChild(typingDiv);
            chatScroll.scrollTop = chatScroll.scrollHeight;

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "mensagem": texto })
                });

                const data = await response.json();
                const loader = document.getElementById(typingId);
                if (loader) loader.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = "ai-msg message-bubble";
                chatScroll.appendChild(aiDiv);

                aiDiv.innerHTML = marked.parse(data.resposta);
                chatScroll.scrollTop = chatScroll.scrollHeight;

            } catch (erro) {
                console.error("Erro na comunicação:", erro);
                const loader = document.getElementById(typingId);
                if (loader) loader.innerHTML = "STATUS: CONNECTION_LOST";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });

        const canvas = document.getElementById('spectrum-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, mouse = { x: -1000, y: -1000, targetX: -1000, targetY: -1000 };
        const colors = [{ h: 0, a: 0.15 }, { h: 30, a: 0.15 }, { h: 60, a: 0.15 }, { h: 140, a: 0.15 }, { h: 200, a: 0.15 }, { h: 270, a: 0.15 }, { h: 320, a: 0.15 }];
        let bands = colors.map((c, i) => ({ ...c, offset: i * 0.8, spd: 0.0006 + (i * 0.0001) }));
        
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('mousemove', (e) => { mouse.targetX = e.clientX; mouse.targetY = e.clientY; });
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            mouse.x += (mouse.targetX - mouse.x) * 0.05; mouse.y += (mouse.targetY - mouse.y) * 0.05;
            ctx.clearRect(0, 0, w, h); ctx.globalCompositeOperation = 'screen';
            const time = Date.now();
            bands.forEach((band, i) => {
                ctx.beginPath();
                for (let x = -100; x <= w + 100; x += 8) {
                    const diagBase = (x / w) * h; const expand = (x / w) * 2.8;
                    const wave = Math.sin((time * band.spd) + (x * 0.001) + band.offset);
                    let y = diagBase + (wave * (110 * expand));
                    const dx = x - mouse.x; const dy = y - mouse.y; const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 400) { const force = Math.pow(1 - dist / 400, 2); y += (dy / dist) * (force * 90); }
                    if (x === -100) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `hsla(${band.h}, 90%, 50%, ${band.a})`;
                ctx.lineWidth = 45 + (i * 10); ctx.lineCap = "round"; ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        draw();

        const typeTarget = document.getElementById('type-target');
        const movingLogo = document.getElementById('moving-logo');
        const phrases = ["<HYDRALYNX", "<CODE", "<DESIGN"];
        let curTxt = "", isDelPhr = false, curPhrIdx = 0;

        window.onload = () => {
            movingLogo.style.left = "50%"; movingLogo.style.top = "50%"; movingLogo.style.transform = "translate(-50%, -50%) scale(2.5)";
            setTimeout(typeInit, 1000);
        };

        function typeInit() {
            const target = phrases[0];
            if (curTxt.length < target.length) {
                curTxt = target.substring(0, curTxt.length + 1);
                typeTarget.innerText = curTxt;
                setTimeout(typeInit, 100);
            } else {
                movingLogo.style.transition = "all 1.5s cubic-bezier(0.85, 0, 0.15, 1)";
                movingLogo.style.left = "2rem"; movingLogo.style.top = "2rem"; movingLogo.style.transform = "scale(1)";
                document.getElementById('loader').style.opacity = "0";
                document.getElementById('main-content').style.opacity = "1";
                setTimeout(() => {
                    document.getElementById('loader').style.display = "none";
                    loopPhrases();
                }, 1200);
            }
        }

        function loopPhrases() {
            const full = phrases[curPhrIdx];
            curTxt = isDelPhr ? full.substring(0, curTxt.length - 1) : full.substring(0, curTxt.length + 1);
            typeTarget.innerText = curTxt;
            let spd = isDelPhr ? 50 : 150;
            if (!isDelPhr && curTxt === full) { spd = 2000; isDelPhr = true; }
            else if (isDelPhr && curTxt === "<") { isDelPhr = false; curPhrIdx = (curPhrIdx + 1) % phrases.length; spd = 500; }
            setTimeout(loopPhrases, spd);
        }

        const obs = new IntersectionObserver((es) => es.forEach(e => e.isIntersecting && e.target.classList.add('active')), { threshold: 0.1 });
        document.querySelectorAll('.reveal-text').forEach(el => obs.observe(el));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydralynx AI | Code Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

    <style>
        body { 
            background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow: hidden; height: 100%; width: 100%; position: fixed; 
        }
        
        #spectrum-canvas { position: fixed; inset: 0; z-index: -1; filter: blur(15px); opacity: 0.8; pointer-events: none; }

        .chat-container {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex; flex-direction: column;
        }

        /* Estilo CMD para as mensagens */
        .message-bubble {
            padding: 15px; margin-bottom: 12px;
            max-width: 95%; font-size: 13px; line-height: 1.6;
            animation: fadeIn 0.3s ease forwards;
            font-family: 'Fira Code', monospace;
        }

        .ai-msg { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.05); color: #d1d5db; }
        .user-msg { border-left: 3px solid #6b7280; background: rgba(255, 255, 255, 0.05); align-self: flex-start; width: 100%; }

        /* Customização do Code Highlight dentro do chat */
        pre[class*="language-"] { 
            background: #0d0d0d !important; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; margin: 15px 0; 
        }

        /* Textarea expansível */
        #user-input {
            scrollbar-width: thin;
            scrollbar-color: #3b82f6 transparent;
            resize: none;
            min-height: 50px;
            max-height: 200px;
        }

        #chat-scroll { overflow-y: auto; scroll-behavior: smooth; }
        #chat-scroll::-webkit-scrollbar { width: 4px; }
        #chat-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .typing-dot { width: 4px; height: 4px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #moving-logo { position: fixed; z-index: 110; font-family: 'Orbitron'; font-weight: 900; pointer-events: none; }
    </style>
</head>
<body class="antialiased">

    <canvas id="spectrum-canvas"></canvas>
    <div id="moving-logo"><span id="type-target"></span><span class="animate-pulse">|</span></div>
    <div id="loader"></div>

    <div id="main-content" class="opacity-0 transition-opacity duration-1000 flex flex-col h-screen">
        <nav class="p-6 flex justify-between items-center">
            <div class="font-orbitron text-xs tracking-widest text-blue-500">HYDRALYNX // CORE_V2</div>
            <div class="text-[9px] font-bold text-gray-500">STATUS: ANALYZER_READY</div>
        </nav>

        <section class="flex-1 flex flex-col items-center justify-center p-4 overflow-hidden mb-4">
            <div class="chat-container w-full max-w-4xl h-[80vh] relative shadow-2xl">
                <div class="w-full px-4 py-2 border-b border-white/10 flex items-center gap-2 bg-white/5">
                    <div class="flex gap-1.5">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
                    </div>
                    <span class="text-[10px] font-mono text-gray-400 ml-4">hydra_terminal --analyze_mode</span>
                </div>

                <div id="chat-scroll" class="flex-1 p-6 flex flex-col gap-4">
                    <div class="ai-msg message-bubble">
                        > Módulo de Análise Neural Ativo.<br>
                        > Insira seu código abaixo para avaliação de performance, bugs e melhorias.<br>
                        > Utilize <span class="text-blue-400">Shift+Enter</span> para quebrar linhas.
                    </div>
                </div>
                
                <div class="p-4 bg-black/60 border-t border-white/10">
                    <div class="relative flex flex-col gap-2">
                        <textarea id="user-input" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-6 focus:outline-none focus:border-blue-500/50 transition-all font-mono text-sm text-gray-300"
                            placeholder="Cole seu código aqui... (Shift+Enter para nova linha)"></textarea>
                        
                        <div class="flex justify-end items-center gap-4">
                            <span class="text-[9px] text-gray-500 font-mono">CMD + ENTER TO SEND</span>
                            <button onclick="enviarMensagem()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                                ANALYZER_RUN 
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Lógica de Shift+Enter e Envio
        const input = document.getElementById('user-input');
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensagem();
            }
        });

        // Auto-resize do textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function enviarMensagem() {
            const chatScroll = document.getElementById('chat-scroll');
            const texto = input.value.trim();

            if (!texto) return;

            // Interface do Usuário (Estilo Código)
            const userDiv = document.createElement('div');
            userDiv.className = "user-msg message-bubble";
            // Escapar HTML para evitar execução de script e manter formatação de código
            userDiv.innerHTML = `<div class="text-blue-400 mb-1">$ USER_INPUT:</div><pre><code>${texto.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>`;
            chatScroll.appendChild(userDiv);
            
            input.value = '';
            input.style.height = 'auto';
            chatScroll.scrollTop = chatScroll.scrollHeight;

            // Loader IA
            const typingId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = "ai-msg message-bubble flex items-center gap-2";
            typingDiv.innerHTML = `> ANALYZING_CODE <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            chatScroll.appendChild(typingDiv);
            chatScroll.scrollTop = chatScroll.scrollHeight;

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "mensagem": "Analise este código, aponte erros e melhorias:\n" + texto })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = "ai-msg message-bubble";
                chatScroll.appendChild(aiDiv);

                // Renderiza Markdown e depois aplica Prism Highlight
                aiDiv.innerHTML = marked.parse(data.resposta);
                Prism.highlightAllUnder(aiDiv);
                
                chatScroll.scrollTop = chatScroll.scrollHeight;

            } catch (erro) {
                document.getElementById(typingId).innerHTML = "> ERROR: CRITICAL_CONNECTION_FAILURE";
            }
        }

        // --- Lógica de Animação Spectrum (Simplificada para Performance) ---
        const canvas = document.getElementById('spectrum-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,w,h);
            const time = Date.now() * 0.001;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${200 + i*20}, 70%, 50%, 0.2)`;
                ctx.lineWidth = 2;
                for(let x=0; x<w; x+=10) {
                    const y = h/2 + Math.sin(x*0.005 + time + i) * 100;
                    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();

        // --- Loader Inicial ---
        const typeTarget = document.getElementById('type-target');
        const phrases = ["<HYDRALYNX_AI", "<CODE_ANALYZER", "<SYSTEM_READY"];
        let pIdx = 0, charIdx = 0;

        function type() {
            if(charIdx < phrases[pIdx].length) {
                typeTarget.innerText += phrases[pIdx][charIdx];
                charIdx++;
                setTimeout(type, 100);
            } else {
                setTimeout(() => {
                    if(pIdx === 0) {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('main-content').classList.remove('opacity-0');
                    }
                    charIdx = 0;
                    pIdx = (pIdx + 1) % phrases.length;
                    typeTarget.innerText = "";
                    type();
                }, 2000);
            }
        }
        window.onload = type;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydralynx AI - UNIP Limeira</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f0f12;
            --text: #ffffff;
            --icon-idle: #555; /* Cor do ícone quando parado */
            --icon-active: #00d2ff; /* Cor do ícone quando ativo */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: var(--secondary);
            border-bottom-right-radius: 2px;
        }

        .ia-message {
            align-self: flex-start;
            background: #2a2a30;
            border-bottom-left-radius: 2px;
            border: 1px solid #444;
        }

        /* --- Estilo da Área de Input e Ícone --- */
        #input-area-container {
            background: #1a1a1f;
            display: flex;
            align-items: center; /* Alinha o ícone verticalmente */
            padding: 0 20px;
        }

        #input-area {
            flex: 1;
            padding: 20px 0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* Estilo para a imagem gerada */
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- ESTILO DO ÍCONE SVG MINIMALISTA --- */
        .image-engine-icon-container {
            width: 30px;
            height: 30px;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-engine-icon-container svg {
            width: 100%;
            height: 100%;
            fill: var(--icon-idle); /* Cor padrão (cinza) */
            transition: fill 0.5s ease, transform 0.3s ease;
        }

        /* Estado ativo do ícone (quando detecta imagem) */
        .image-engine-icon-container.active svg {
            fill: var(--icon-active); /* Cor ativa (azul neon) */
            transform: scale(1.1); /* Pequeno aumento */
            filter: drop-shadow(0 0 5px var(--icon-active)); /* Brilho neon */
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">HYDRALYNX AI</h2>
        <small>UNIP LIMEIRA - PROJETO EDUCACIONAL 2026</small>
    </header>

    <div id="chat-container">
        <div class="message ia-message">
            Olá! Sou a Hydralynx. Posso conversar com você ou gerar imagens incríveis. O que deseja criar agora?
        </div>
    </div>

    <div id="input-area-container">
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Digite sua mensagem ou peça uma imagem..." onkeypress="handleKey(event)">
            <button id="send-btn" onclick="enviar()">Enviar</button>
        </div>
        
        <div class="image-engine-icon-container" id="image-icon-container" title="Motor de Imagem (Inativo)">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4ZM4 6V18H20V6H4ZM12 16C9.79 16 8 14.21 8 12C8 9.79 9.79 8 12 8C14.21 8 16 9.79 16 12C16 14.21 14.21 16 12 16ZM12 10C10.9 10 10 10.9 10 12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12C14 10.9 13.1 10 12 10Z"/>
            </svg>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const imageIconContainer = document.getElementById('image-icon-container');

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-message' : 'ia-message'}`;
            msgDiv.innerHTML = text; 
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function enviar() {
            const mensagem = userInput.value.trim();
            if (!mensagem) return;

            // --- LÓGICA DE DETECÇÃO ---
            // Palavras-chave idênticas às do Python
            const palavrasChave = ["gere", "imagem", "foto", "desenhe", "crie uma imagem"];
            const querImagem = palavrasChave.some(palavra => mensagem.toLowerCase().includes(palavra));

            // Ativa o ícone minimalista se for um pedido de imagem
            if (querImagem) {
                imageIconContainer.classList.add('active');
                imageIconContainer.title = "Motor de Imagem (Ativo)";
            } else {
                imageIconContainer.classList.remove('active');
                imageIconContainer.title = "Motor de Imagem (Inativo)";
            }

            // Desativa botão e limpa input
            appendMessage('user', mensagem);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Mensagem de "pensando"
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message ia-message';
            loadingMsg.innerText = querImagem ? 'Hydralynx Gerando Imagem Realista (isso pode levar alguns segundos)...' : 'Hydralynx processando...';
            chatContainer.appendChild(loadingMsg);

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: mensagem })
                });

                const data = await response.json();
                
                chatContainer.removeChild(loadingMsg);
                appendMessage('ia', data.resposta);

            } catch (error) {
                chatContainer.removeChild(loadingMsg);
                appendMessage('ia', 'ERRO: O sistema falhou ao conectar com o núcleo.');
            } finally {
                // --- DESATIVA O ÍCONE ---
                // imageIconContainer.classList.remove('active'); // Opcional: desativar ao final
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter') enviar();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" class="h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydralynx AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100%; position: fixed; width: 100%; }
        
        #spectrum-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; filter: blur(12px); opacity: 0.9; }

        .chat-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column;
        }

        .message-bubble {
            padding: 12px 18px; border-radius: 15px; margin-bottom: 10px;
            max-width: 85%; font-size: 14px; line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
        }

        /* Estilização interna do Markdown e Códigos */
        .ai-msg h2, .ai-msg h3 { font-size: 1.1rem; font-weight: bold; color: #3b82f6; margin: 10px 0 5px 0; font-family: 'Orbitron'; }
        .ai-msg code { font-family: monospace; color: #f87171; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        pre[class*="language-"] { border-radius: 10px; margin: 10px 0; font-size: 13px !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { background: rgba(255, 255, 255, 0.1); align-self: flex-end; border-bottom-right-radius: 2px; white-space: pre-wrap; }
        .ai-msg { border: 1px solid rgba(59, 130, 246, 0.3); align-self: flex-start; border-bottom-left-radius: 2px; color: #e2e8f0; }

        #chat-scroll { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
        #chat-scroll::-webkit-scrollbar { width: 4px; }
        #chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Estilo do Textarea para suportar Shift+Enter */
        #user-input {
            width: 100%; bg-white/5; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 12px 60px 12px 20px;
            focus: outline-none; focus: border-blue-500/50;
            background: rgba(255,255,255,0.05); color: white;
            resize: none; min-height: 48px; max-height: 150px; line-height: 1.4;
        }

        .typing-dot { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #moving-logo { position: fixed; z-index: 110; font-family: 'Orbitron'; font-weight: 900; pointer-events: none; text-transform: uppercase; }
        #main-content { opacity: 0; transition: opacity 1.5s ease; height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <canvas id="spectrum-canvas"></canvas>
    <div id="moving-logo"><span id="type-target"></span><span class="blink-under">|</span></div>
    <div id="loader"></div>

    <div id="main-content">
        <nav class="fixed top-0 left-0 w-full z-50 flex justify-end p-8">
            <a href="#" class="text-[10px] font-bold tracking-[0.3em] uppercase text-gray-400 hover:text-white transition-colors">API_STATUS: ONLINE</a>
        </nav>

        <section class="flex-1 flex flex-col items-center justify-center p-4 overflow-hidden">
            <div class="reveal-text text-center mb-6">
                <p class="font-orbitron text-blue-400 tracking-[0.5em] text-[10px] mb-2 uppercase">Interface Neural</p>
                <h2 class="text-3xl font-bold font-orbitron tracking-tighter">HYDRALYNX <span class="text-gray-600">AI</span></h2>
            </div>

            <div class="reveal-text chat-container w-full max-w-3xl h-[65vh] relative overflow-hidden">
                <div class="w-full px-6 py-3 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <div class="flex items-center">
                        <span class="text-[9px] font-orbitron tracking-[0.3em] text-blue-400 animate-pulse">● ANALYZER_MODE</span>
                    </div>
                    <span class="text-[9px] font-orbitron tracking-[0.3em] text-gray-500">ENCRYPTED</span>
                </div>

                <div id="chat-scroll">
                    <div class="ai-msg message-bubble">
                        Sistemas prontos. Cole seu código para análise. Use <b>Shift+Enter</b> para múltiplas linhas.
                    </div>
                </div>
                
                <div class="p-4 bg-black/40 border-t border-white/5">
                    <div class="relative flex items-end">
                        <textarea id="user-input" rows="1" placeholder="Envie um comando ou código..."></textarea>
                        <button onclick="enviarMensagem()" class="absolute right-2 bottom-1.5 p-3 bg-white text-black rounded-full hover:scale-105 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const input = document.getElementById('user-input');

        // Ajuste automático de altura e Shift+Enter
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensagem();
            }
        });

        async function enviarMensagem() {
            const chatScroll = document.getElementById('chat-scroll');
            const texto = input.value.trim();
            if (!texto) return;

            const userDiv = document.createElement('div');
            userDiv.className = "user-msg message-bubble";
            userDiv.innerText = texto;
            chatScroll.appendChild(userDiv);
            
            input.value = '';
            input.style.height = '48px';
            chatScroll.scrollTop = chatScroll.scrollHeight;

            const typingId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = "ai-msg message-bubble flex items-center gap-1";
            typingDiv.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            chatScroll.appendChild(typingDiv);
            chatScroll.scrollTop = chatScroll.scrollHeight;

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "mensagem": "Analise tecnicamente este código, avalie o que funciona e o que pode melhorar:\n" + texto })
                });

                const data = await response.json();
                const loader = document.getElementById(typingId);
                if (loader) loader.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = "ai-msg message-bubble";
                chatScroll.appendChild(aiDiv);

                // Converte Markdown e aplica Highlighting do Prism
                aiDiv.innerHTML = marked.parse(data.resposta);
                Prism.highlightAllUnder(aiDiv);
                
                chatScroll.scrollTop = chatScroll.scrollHeight;

            } catch (erro) {
                const loader = document.getElementById(typingId);
                if (loader) loader.innerHTML = "ERRO NA CONEXÃO NEURAL";
            }
        }

        // --- Código do Spectrum e Loader (Mantidos conforme o original) ---
        const canvas = document.getElementById('spectrum-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, mouse = { x: -1000, y: -1000, targetX: -1000, targetY: -1000 };
        const colors = [{ h: 200, a: 0.15 }, { h: 270, a: 0.15 }, { h: 320, a: 0.15 }];
        let bands = colors.map((c, i) => ({ ...c, offset: i * 0.8, spd: 0.0006 + (i * 0.0001) }));
        
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('mousemove', (e) => { mouse.targetX = e.clientX; mouse.targetY = e.clientY; });
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            mouse.x += (mouse.targetX - mouse.x) * 0.05; mouse.y += (mouse.targetY - mouse.y) * 0.05;
            ctx.clearRect(0, 0, w, h); ctx.globalCompositeOperation = 'screen';
            const time = Date.now();
            bands.forEach((band, i) => {
                ctx.beginPath();
                for (let x = -100; x <= w + 100; x += 8) {
                    const wave = Math.sin((time * band.spd) + (x * 0.001) + band.offset);
                    let y = ((x / w) * h) + (wave * 150);
                    if (x === -100) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `hsla(${band.h}, 90%, 50%, ${band.a})`;
                ctx.lineWidth = 50; ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        draw();

        const typeTarget = document.getElementById('type-target');
        const movingLogo = document.getElementById('moving-logo');
        const phrases = ["<HYDRALYNX"];
        window.onload = () => {
            movingLogo.style.left = "50%"; movingLogo.style.top = "50%"; movingLogo.style.transform = "translate(-50%, -50%) scale(2.5)";
            let curTxt = "";
            const target = phrases[0];
            function typeInit() {
                if (curTxt.length < target.length) {
                    curTxt = target.substring(0, curTxt.length + 1);
                    typeTarget.innerText = curTxt;
                    setTimeout(typeInit, 100);
                } else {
                    movingLogo.style.transition = "all 1.5s cubic-bezier(0.85, 0, 0.15, 1)";
                    movingLogo.style.left = "2rem"; movingLogo.style.top = "2rem"; movingLogo.style.transform = "scale(1)";
                    document.getElementById('loader').style.opacity = "0";
                    document.getElementById('main-content').style.opacity = "1";
                    setTimeout(() => document.getElementById('loader').style.display = "none", 1200);
                }
            }
            setTimeout(typeInit, 1000);
        };

        const obs = new IntersectionObserver((es) => es.forEach(e => e.isIntersecting && e.target.classList.add('active')), { threshold: 0.1 });
        document.querySelectorAll('.reveal-text').forEach(el => obs.observe(el));
    </script>
</body>
</html>
